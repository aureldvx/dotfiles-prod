"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$time\
$git_branch\
$git_status\
$docker_context\
$container\
$line_break\
$username\
$hostname\
$directory\
$sudo\
$line_break\
$character"""

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'

[directory]
home_symbol = '~'
truncation_length = 3
truncate_to_repo = false
truncation_symbol = ''
style = 'bold blue'

[docker_context]
format = '[ · $context]($style)'
style = 'dimmed'

[git_branch]
symbol = ''
format = '[· $symbol $branch(:$remote_branch)]($style)'
style = 'dimmed'

[git_status]
format = ' ([\[$all_status$ahead_behind\]]($style))'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = '✓'
untracked = '?'
stashed = '$'
modified = '!'
staged = '++\($count\)'
renamed = '»'
deleted = '✘'
style = 'dimmed'

[hostname]
format = '@[$hostname]($style):'
disabled = false
ssh_only = false
style = 'bold bright-green'

[username]
style_user = 'bright-yellow bold'
style_root = 'bright-red bold'
format = '[$user]($style)'
show_always = true

[time]
disabled = false
time_format = "%T"
style = "dimmed"
format = '[ $time]($style) '
